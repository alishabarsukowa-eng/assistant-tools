<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека промптов · просто в онлайн</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#9b8fcf;
    --purple-dark:#3c3489;
    --bg:#f5f3ef;
    --bg-soft:#f2f0fb;
    --card:#ffffff;
    --text:#2c2c2a;
    --text-soft:#5f5e5a;
    --border:#e3ddf5;
    --radius:9px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Mulish', sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
  }
  header{
    background:var(--bg-soft);
    padding:32px 20px 24px;
    border-bottom:1px solid var(--border);
  }
  header .inner{
    max-width:920px;
    margin:0 auto;
  }
  h1{
    font-family:'Unbounded', sans-serif;
    font-weight:600;
    font-size:28px;
    margin:0 0 6px;
    color:var(--purple-dark);
  }
  header p{
    margin:0;
    color:var(--text-soft);
    font-size:15px;
  }
  main{
    max-width:920px;
    margin:0 auto;
    padding:24px 20px 60px;
  }
  .controls{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:24px;
  }
  .controls input[type="text"]{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    font-family:'Mulish', sans-serif;
    font-size:15px;
    background:var(--card);
    color:var(--text);
  }
  .filters{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
  }
  .filters select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    font-family:'Mulish', sans-serif;
    font-size:14px;
    background:var(--card);
    color:var(--text);
  }
  .count{
    font-size:14px;
    color:var(--text-soft);
    margin-bottom:16px;
  }
  .grid{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 20px;
  }
  .card h3{
    font-family:'Unbounded', sans-serif;
    font-weight:500;
    font-size:17px;
    margin:0 0 10px;
    color:var(--text);
  }
  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:12px;
  }
  .tag{
    font-size:12px;
    padding:3px 10px;
    border-radius:999px;
    background:var(--bg-soft);
    color:var(--purple-dark);
    font-weight:500;
  }
  .tag.diff-base{ background:#e7f4ec; color:#1f6b41; }
  .tag.diff-mid{ background:#fdf1de; color:#8a5a17; }
  .tag.diff-adv{ background:#fbe9ec; color:#9a2f3f; }
  .prompt-text{
    background:var(--bg-soft);
    border-radius:6px;
    padding:12px 14px;
    font-size:13.5px;
    white-space:pre-wrap;
    color:var(--text);
    margin-bottom:12px;
    font-family:'Mulish', monospace, sans-serif;
  }
  .copy-btn{
    border:1px solid var(--border);
    background:var(--card);
    color:var(--purple-dark);
    font-family:'Mulish', sans-serif;
    font-size:13px;
    font-weight:500;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:background .15s;
  }
  .copy-btn:hover{ background:var(--bg-soft); }
  .copy-btn.copied{ background:#e7f4ec; color:#1f6b41; border-color:#cfe9d8; }
  .empty{
    text-align:center;
    color:var(--text-soft);
    padding:40px 0;
    font-size:15px;
  }
  footer{
    text-align:center;
    font-size:12px;
    color:var(--text-soft);
    padding:20px;
  }
  @media (max-width: 640px){
    .filters{ grid-template-columns:repeat(2, 1fr); }
    h1{ font-size:24px; }
  }
</style>
</head>
<body>

<header>
  <div class="inner">
    <h1>Библиотека промптов</h1>
    <p>Готовые промпты для работы ассистента — фильтруй по задаче, роли, модулю и сложности</p>
  </div>
</header>

<main>
  <div class="controls">
    <input type="text" id="search" placeholder="Поиск по названию или тексту промпта">
    <div class="filters">
      <select id="f-task"><option value="">Задача: все</option></select>
      <select id="f-role"><option value="">Роль: все</option></select>
      <select id="f-diff"><option value="">Сложность: все</option></select>
    </div>
  </div>

  <div class="count" id="count"></div>
  <div class="grid" id="list"></div>
  <div class="empty" id="empty" style="display:none;">Ничего не найдено — попробуй изменить запрос или фильтры</div>
</main>

<footer>Материал для внутреннего использования · alishkas_</footer>

function fillSelect(id, items){
  const sel = document.getElementById(id);
  items.forEach(v=>{
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

fillSelect('f-diff', allDiffs);

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

  const q = document.getElementById('search').value.trim().toLowerCase();
  const ft = document.getElementById('f-task').value;
  const fr = document.getElementById('f-role').value;
  const fd = document.getElementById('f-diff').value;

  const filtered = DATA.filter(d=>{
    if(ft && !d.task.includes(ft)) return false;
    if(fr && !d.role.includes(fr)) return false;
    if(fd && d.diff!==fd) return false;
    if(q && !(d.title.toLowerCase().includes(q) || d.text.toLowerCase().includes(q))) return false;
    return true;
  });

  document.getElementById('count').textContent = filtered.length + (filtered.length===1?' промпт':' промптов');

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  list.innerHTML = '';

  if(filtered.length === 0){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach(d=>{
    const card = document.createElement('div');
    card.className = 'card';

    const tags = [];
    tags.push(`<span class="tag ${diffClass[d.diff]}">${d.diff}</span>`);
    d.task.forEach(t=>tags.push(`<span class="tag">${t}</span>`));
    tags.push(`<span class="tag">${d.format}</span>`);

    card.innerHTML = `
      <h3>${escapeHtml(d.title)}</h3>
      <div class="tags">${tags.join('')}</div>
      <div class="prompt-text">${escapeHtml(d.text)}</div>
      <button class="copy-btn" type="button">Скопировать</button>
    `;
    list.appendChild(card);

    const btn = card.querySelector('.copy-btn');
    btn.addEventListener('click', ()=>{
      navigator.clipboard.writeText(d.text).then(()=>{
        btn.textContent = 'Скопировано';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent = 'Скопировать'; btn.classList.remove('copied'); }, 1500);
      });
    });
  });
}

['search','f-task','f-role','f-diff'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

render();
</script>
</body>
</html>
